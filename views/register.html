<!DOCTYPE html>
<html>
<head>
  <title>Register - MY FAMILY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family:Arial;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .card{
      background:#1e293b;
      padding:30px;
      border-radius:12px;
      width:300px;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:6px;
    }

    button{
      width:100%;
      padding:12px;
      background:#22c55e;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Create Account</h2>

  <input type="text" placeholder="Username">
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">

  <button>Create Account</button>
</div>

</body>
</html>
